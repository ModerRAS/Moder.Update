name: Publish to NuGet and GitHub Release

on:
  workflow_dispatch:
    inputs:
      version_prefix:
        description: 'Version prefix (e.g., 0.1)'
        required: true
        default: '0.1'

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $VERSION = "${{ inputs.version_prefix }}.${{ github.run_number }}"
          echo "VERSION=$VERSION" >> $env:GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $env:GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Add git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.TAG }}
          git push origin ${{ steps.version.outputs.TAG }}

      - name: Pack NuGet
        run: |
          dotnet pack src/Moder.Update/Moder.Update.csproj -c Release -o ./nupkg /p:PackageVersion=${{ steps.version.outputs.VERSION }}

      - name: Build Updater (Rust, win-x64)
        working-directory: src/updater
        run: |
          cargo build --release --target x86_64-pc-windows-msvc

      - name: Test Updater
        working-directory: src/updater
        run: |
          cargo test --release

      - name: Prepare publish artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path publish
          Copy-Item "src/updater/target/x86_64-pc-windows-msvc/release/moder_update_updater.exe" "publish/Moder.Update.Updater.exe"

      - name: Push to NuGet
        env:
          NUGET_KEY: ${{ secrets.NUGET_KEY }}
        run: |
          dotnet nuget push nupkg/*.nupkg --api-key "$env:NUGET_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            publish/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List artifacts
        shell: pwsh
        run: |
          echo "=== NuGet Packages ==="
          Get-ChildItem nupkg/
          echo ""
          echo "=== GitHub Release Files ==="
          Get-ChildItem publish/
