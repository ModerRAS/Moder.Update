name: Publish to NuGet and GitHub Release

on:
  workflow_dispatch:
    inputs:
      version_prefix:
        description: 'Version prefix (e.g., 0.1)'
        required: true
        default: '0.1'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determine version
        id: version
        run: |
          VERSION="${{ inputs.version_prefix }}.${{ github.run_number }}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Add git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.TAG }}
          git push origin ${{ steps.version.outputs.TAG }}

      - name: Pack NuGet
        run: |
          dotnet pack src/Moder.Update/Moder.Update.csproj \
            -c Release \
            -o ./nupkg \
            /p:PackageVersion=${{ steps.version.outputs.VERSION }}

      - name: Publish Updater (win-x64, self-contained)
        run: |
          dotnet publish src/Moder.Update.Updater/Moder.Update.Updater.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=false \
            -o ./publish/Updater-win-x64

      - name: Create ZIP for Updater
        run: |
          cd publish/Updater-win-x64
          zip -r ../Moder.Update.Updater-win-x64.zip .
          cd ../..
          ls -la publish/

      - name: Push to NuGet
        env:
          NUGET_KEY: ${{ secrets.NUGET_KEY }}
        run: |
          dotnet nuget push nupkg/*.nupkg \
            --api-key "$NUGET_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            publish/Moder.Update.Updater-win-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List artifacts
        run: |
          echo "=== NuGet Packages ==="
          ls -la nupkg/
          echo ""
          echo "=== GitHub Release Files ==="
          ls -la publish/
